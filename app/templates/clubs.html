{% extends "base.html" %}

{% block title %}Clubs | VoetbalBase{% endblock %}

{% block content %}
<div class="card table-card">
    <h2 class="section-title">Clubs</h2>
    <p class="section-subtitle mb-4">Overzicht van alle clubs.</p>

    {% if clubs %}
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th>Naam</th>
                    <th>Land</th>
                </tr>
            </thead>
            <tbody>
                {% for club in clubs %}
                <tr>
                    <td>{{ club.naam }}</td>
                    <td>{{ club.land }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <p class="text-muted mb-0">Geen clubs gevonden.</p>
    {% endif %}
</div>
{% endblock %}
